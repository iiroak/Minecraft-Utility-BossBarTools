# Automatically build the project and create releases for every push to main
# Also runs tests for pull requests

name: Build and Release
on: 
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      
      - name: build
        run: ./gradlew build

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "mod_version=" gradle.properties | cut -d'=' -f2)
          MINECRAFT=$(grep "minecraft_version=" gradle.properties | cut -d'=' -f2)
          TIMESTAMP=$(date +"%Y%m%d-%H%M")
          echo "release_tag=v${VERSION}-${MINECRAFT}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: "Boss Bar Tools - ${{ github.event.head_commit.message }}"
          body: ${{ github.event.head_commit.message }}
          files: build/libs/*.jar
          generate_release_notes: true